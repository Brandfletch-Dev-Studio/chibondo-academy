<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Chibondo Academy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1e2d5c;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f1729; --card: #1e2d5c22; --text: #f1f5f9; --muted: #94a3b8; --border: #1e3a5f; }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2.5rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .icon {
      width: 72px; height: 72px;
      background: rgba(30, 45, 92, 0.08);
      border-radius: 1rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { width: 36px; height: 36px; color: var(--primary); stroke: var(--primary); }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.9rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--primary); color: #fff;
      border: none; border-radius: 0.75rem;
      padding: 0.75rem 1.5rem; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.88; }
    .status {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.75rem; color: var(--muted);
      background: rgba(100,116,139,0.08);
      border-radius: 9999px; padding: 0.3rem 0.8rem;
      margin-top: 1rem;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 6l5 5" /><path d="M1 1l22 22" /><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" /><path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <circle cx="12" cy="20" r="1" fill="currentColor" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection detected. Some content may be available from your cache. Check your connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" stroke-linecap="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
      Try Again
    </button>
    <div class="status">
      <div class="dot"></div>
      Waiting for connection…
    </div>
  </div>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
