    <!-- ══ INLINE SPLASH SCREEN ══════════════════════════════════════════════
         Shows instantly before any JS/CSS loads. Hidden once React mounts.  -->
    <style>
      #aca-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
        background: linear-gradient(135deg, #1e2d5c 0%, #0d1b3e 100%);
        font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
        transition: opacity 0.4s ease;
      }
      #aca-splash.hidden { opacity: 0; pointer-events: none; }
      #aca-splash .logo-ring {
        width: 88px; height: 88px; border-radius: 22px;
        background: linear-gradient(135deg, #1e2d5c, #2d4a8a);
        border: 2px solid rgba(201,168,76,0.3);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 40px rgba(201,168,76,0.15);
      }
      #aca-splash .wordmark {
        color: #fff; font-size: 1.15rem; font-weight: 800;
        letter-spacing: 0.08em; text-align: center; line-height: 1.2;
      }
      #aca-splash .wordmark span { color: #c9a84c; }
      #aca-splash .tagline {
        color: rgba(201,168,76,0.7); font-size: 0.7rem;
        letter-spacing: 0.18em; text-transform: uppercase;
      }
      #aca-splash .bar-track {
        width: 150px; height: 3px; background: rgba(255,255,255,0.08);
        border-radius: 9999px; overflow: hidden;
      }
      #aca-splash .bar-fill {
        height: 100%; width: 40%;
        background: linear-gradient(90deg, transparent, #c9a84c, transparent);
        border-radius: 9999px;
        animation: aca-sweep 1.4s ease-in-out infinite;
      }
      @keyframes aca-sweep {
        0%   { transform: translateX(-200%); }
        100% { transform: translateX(450%); }
      }
      /* Decorative rings */
      #aca-splash .rings {
        position: absolute; inset: 0; pointer-events: none; overflow: hidden;
      }
      #aca-splash .rings circle {
        fill: none; stroke: rgba(201,168,76,0.04); stroke-width: 1.5;
      }
    </style>
  </head>
  <body>
    <!-- Branded splash — visible before React JS loads -->
    <div id="aca-splash">
      <div class="rings">
        <svg width="100%" height="100%" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <circle cx="195" cy="380" r="160"/>
          <circle cx="195" cy="380" r="250"/>
          <circle cx="195" cy="380" r="340"/>
        </svg>
      </div>
      <!-- Logo mark — real ACA quill + twin frames logo -->
      <div class="logo-ring">
        <svg width="88" height="88" viewBox="0 0 200 244" xmlns="http://www.w3.org/2000/svg" fill="none">
          <!-- Back frame (offset) -->
          <rect x="26" y="12" width="108" height="146" rx="3" stroke="#C9A84C" stroke-width="5.5" fill="none" opacity="0.6"/>
          <!-- Front frame -->
          <rect x="42" y="26" width="108" height="146" rx="3" stroke="#C9A84C" stroke-width="5.5" fill="none"/>
          <!-- Quill / feather body -->
          <path d="M96 36 C138 30 166 56 160 98 C154 132 128 158 106 176 C101 181 98 186 96 194 C94 186 91 181 86 176 C64 158 38 132 32 98 C26 56 54 30 96 36 Z" fill="#C9A84C"/>
          <!-- Rachis -->
          <line x1="96" y1="40" x2="96" y2="216" stroke="#7A5200" stroke-width="3.5" stroke-linecap="round"/>
          <!-- Left barbs -->
          <path d="M96 60 C78 68 62 78 48 90" stroke="#7A5200" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M96 77 C76 86 59 98 45 111" stroke="#7A5200" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path d="M96 94 C77 103 61 115 48 128" stroke="#7A5200" stroke-width="1.4" fill="none" stroke-linecap="round"/>
          <path d="M96 111 C80 120 66 132 56 146" stroke="#7A5200" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <path d="M96 128 C83 136 72 148 66 160" stroke="#7A5200" stroke-width="1" fill="none" stroke-linecap="round"/>
          <!-- Right barbs -->
          <path d="M96 60 C114 68 130 78 144 90" stroke="#7A5200" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M96 77 C116 86 133 98 147 111" stroke="#7A5200" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path d="M96 94 C115 103 131 115 144 128" stroke="#7A5200" stroke-width="1.4" fill="none" stroke-linecap="round"/>
          <path d="M96 111 C112 120 126 132 136 146" stroke="#7A5200" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <path d="M96 128 C109 136 120 148 126 160" stroke="#7A5200" stroke-width="1" fill="none" stroke-linecap="round"/>
          <!-- Nib -->
          <path d="M93 194 L89 220 L96 232 L103 220 L99 194 Z" fill="#C9A84C"/>
          <!-- Base pedestal -->
          <path d="M82 226 Q96 242 110 226 L104 218 L88 218 Z" fill="#0d1420" stroke="#C9A84C" stroke-width="2"/>
        </svg>
      </div>
      <!-- Wordmark -->
      <div class="wordmark">CHIBONDO<br/><span>ACADEMY</span></div>
      <div class="tagline">Learn &middot; Grow &middot; Excel</div>
      <!-- Progress bar -->
      <div class="bar-track"><div class="bar-fill"></div></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash once React has mounted
      document.addEventListener('DOMContentLoaded', function() {
        var splash = document.getElementById('aca-splash');
        // Watch for #root to have children (React mounted)
        var observer = new MutationObserver(function() {
          if (document.getElementById('root').children.length > 0) {
            splash.classList.add('hidden');
            setTimeout(function() { splash.remove(); }, 450);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
        // Failsafe: remove after 8s regardless
        setTimeout(function() {
          splash.classList.add('hidden');
          setTimeout(function() { if (splash.parentNode) splash.remove(); }, 450);
        }, 8000);
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
