<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Default SEO Meta Tags (overridden per-page by React SEO component) -->
    <title>Chibondo Academy - Quality Online Secondary Education in Malawi</title>
    <meta name="description" content="Chibondo Academy offers quality online secondary education for Form 3 and Form 4 students in Malawi. Access video lessons, quizzes, past papers, and expert tutoring. Fees from MWK 10,000/month." />
    <meta name="keywords" content="online school Malawi, MSCE courses, Form 3 lessons, Form 4 lessons, secondary education Malawi, e-learning Malawi, Chibondo Academy" />
    <meta name="author" content="Chibondo Academy" />
    
    <!-- Open Graph / Social Media (static fallback — React overrides these per-page) -->
    <meta property="og:title" content="Chibondo Academy - Quality Online Secondary Education in Malawi" />
    <meta property="og:description" content="Chibondo Academy offers quality MSCE lessons, quizzes, past papers, and expert tutoring for Form 3 & 4 students in Malawi. Fees from MWK 10,000/month." />
    <meta property="og:image" content="https://media.base44.com/images/public/6a212896f8e71114ad51c36f/3fd7d6af7_FB_IMG_1780187860438.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.chibondoacademy.com" />
    <meta property="og:site_name" content="Chibondo Academy" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ChibondoAcademy" />
    <meta name="twitter:title" content="Chibondo Academy - Quality Online Secondary Education in Malawi" />
    <meta name="twitter:description" content="Chibondo Academy offers quality MSCE lessons, quizzes, past papers, and expert tutoring for Form 3 & 4 students in Malawi." />
    <meta name="twitter:image" content="https://media.base44.com/images/public/6a212896f8e71114ad51c36f/3fd7d6af7_FB_IMG_1780187860438.jpg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://app.chibondoacademy.com" />
    

    <!-- Theme color for Android status bar (mandatory for Google Play) -->
    <meta name="theme-color" content="#1e2d5c" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1729" media="(prefers-color-scheme: dark)" />
    <!-- Mobile web app capable -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
